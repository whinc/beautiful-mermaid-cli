<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 494.772 630" width="494.772" height="630" style="--bg:#282a36;--fg:#f8f8f2;--line:#6272a4;--accent:#bd93f9;--muted:#6272a4;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.5, 0 5" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<line class="lifeline" data-actor="User" x1="70" y1="70" x2="70" y2="600" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="CLI" x1="210" y1="70" x2="210" y2="600" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="Renderer" x1="350" y1="70" x2="350" y2="600" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="User" data-to="CLI" data-label="bmermaid input.mmd -o output.svg" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="70" y1="90" x2="210" y2="90" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="140" y="80" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">bmermaid input.mmd -o output.svg</text>
</g>
<g class="message" data-from="CLI" data-to="CLI" data-label="Parse arguments" data-line-style="solid" data-arrow-head="filled" data-self="true">
  <polyline points="210,130 240,130 240,150 210,150" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="248" y="140" font-size="11" text-anchor="start" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Parse arguments</text>
</g>
<g class="message" data-from="CLI" data-to="CLI" data-label="Read input file" data-line-style="solid" data-arrow-head="filled" data-self="true">
  <polyline points="210,200 240,200 240,220 210,220" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="248" y="210" font-size="11" text-anchor="start" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Read input file</text>
</g>
<g class="message" data-from="CLI" data-to="Renderer" data-label="renderMermaid(code, options)" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="210" y1="270" x2="350" y2="270" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="280" y="260" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">renderMermaid(code, options)</text>
</g>
<g class="message" data-from="Renderer" data-to="Renderer" data-label="Apply theme" data-line-style="solid" data-arrow-head="filled" data-self="true">
  <polyline points="350,310 380,310 380,330 350,330" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="388" y="320" font-size="11" text-anchor="start" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Apply theme</text>
</g>
<g class="message" data-from="Renderer" data-to="Renderer" data-label="Generate SVG" data-line-style="solid" data-arrow-head="filled" data-self="true">
  <polyline points="350,380 380,380 380,400 350,400" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="388" y="390" font-size="11" text-anchor="start" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Generate SVG</text>
</g>
<g class="message" data-from="Renderer" data-to="CLI" data-label="Return SVG string" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="350" y1="450" x2="210" y2="450" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="280" y="440" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Return SVG string</text>
</g>
<g class="message" data-from="CLI" data-to="CLI" data-label="Write to output file" data-line-style="solid" data-arrow-head="filled" data-self="true">
  <polyline points="210,490 240,490 240,510 210,510" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="248" y="500" font-size="11" text-anchor="start" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Write to output file</text>
</g>
<g class="message" data-from="CLI" data-to="User" data-label="Done!" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="210" y1="560" x2="70" y2="560" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="140" y="550" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Done!</text>
</g>
<g class="actor" data-id="User" data-label="User" data-type="participant">
  <rect x="30" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="70" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">User</text>
</g>
<g class="actor" data-id="CLI" data-label="CLI" data-type="participant">
  <rect x="170" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="210" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">CLI</text>
</g>
<g class="actor" data-id="Renderer" data-label="Renderer" data-type="participant">
  <rect x="304.126" y="30" width="91.74799999999999" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="350" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Renderer</text>
</g>
</svg>